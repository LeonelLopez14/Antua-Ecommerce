<h2 class="sr-only">Diagrama entidad-relación del modelo de datos de Antojarte para MySQL, incluyendo usuarios, productos, variantes, tags, carrito, cupones, órdenes y reviews</h2>
<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS ||--o{ ADDRESSES : has
  USERS ||--o{ ORDERS : places
  USERS ||--o| CARTS : owns
  USERS ||--o{ REVIEWS : writes

  PRODUCTS ||--o{ PRODUCT_VARIANTS : has
  PRODUCTS ||--o{ PRODUCT_IMAGES : has
  PRODUCTS ||--o{ PRODUCT_TAGS : tagged
  TAGS ||--o{ PRODUCT_TAGS : groups
  PRODUCTS ||--o{ REVIEWS : receives

  CARTS ||--o{ CART_ITEMS : contains
  PRODUCT_VARIANTS ||--o{ CART_ITEMS : selected_as
  COUPONS ||--o{ CARTS : applied_to

  ORDERS ||--o{ ORDER_ITEMS : contains
  PRODUCT_VARIANTS ||--o{ ORDER_ITEMS : selected_as
  COUPONS ||--o{ ORDERS : applied_to
  ORDERS ||--o| PAYMENTS : has

  USERS {
    int id PK
    string full_name
    string email UK
    string password_hash
    string phone
    datetime created_at
  }
  ADDRESSES {
    int id PK
    int user_id FK
    string label
    string street
    string city
    string postal_code
    string country
    boolean is_default
  }
  TAGS {
    int id PK
    string name
    string slug UK
  }
  PRODUCTS {
    int id PK
    string name
    string slug UK
    text description
    text ingredients
    text allergens
    decimal base_price
    boolean is_active
  }
  PRODUCT_VARIANTS {
    int id PK
    int product_id FK
    string name
    string sku UK
    decimal price
    int stock
  }
  PRODUCT_IMAGES {
    int id PK
    int product_id FK
    string url
    int sort_order
  }
  PRODUCT_TAGS {
    int product_id PK
    int tag_id PK
  }
  CARTS {
    int id PK
    int user_id FK
    string guest_token
    int coupon_id FK
  }
  CART_ITEMS {
    int id PK
    int cart_id FK
    int variant_id FK
    int quantity
    decimal unit_price_snapshot
  }
  COUPONS {
    int id PK
    string code UK
    string discount_type
    decimal discount_value
    decimal min_order_amount
    int usage_limit
    date valid_until
    boolean is_active
  }
  ORDERS {
    int id PK
    int user_id FK
    string guest_email
    int coupon_id FK
    string status
    string payment_status
    string shipping_full_name
    string shipping_street
    string shipping_city
    string shipping_postal_code
    decimal subtotal
    decimal discount_amount
    decimal shipping_amount
    decimal total
    datetime created_at
  }
  ORDER_ITEMS {
    int id PK
    int order_id FK
    int variant_id FK
    string product_name_snapshot
    decimal unit_price_snapshot
    int quantity
  }
  PAYMENTS {
    int id PK
    int order_id FK
    string method
    string status
    string transaction_ref
    datetime paid_at
  }
  REVIEWS {
    int id PK
    int product_id FK
    int user_id FK
    int rating
    text comment
    datetime created_at
  }`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
